name: Security Scan CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  RUST_VERSION: 1.70.0
  NODE_VERSION: 18

jobs:
  security-scan:
    name: Contract Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ env.RUST_VERSION }}
        
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install Soroban CLI
      run: |
        curl -L https://github.com/stellar/soroban/releases/latest/download/soroban-cli-linux-x86_64.tar.gz | tar xz
        sudo mv soroban /usr/local/bin/
        
    - name: Install contract dependencies
      run: |
        cd contracts
        cargo build --release
        
    - name: Install TypeScript dependencies
      run: |
        npm install -g ts-node typescript
        cd contracts/scripts
        npm install
        
    - name: Run security scanner on all contracts
      run: |
        cd contracts
        find src -name "*.rs" -type f > contract_files.txt
        
        # Run security scan with CI mode (fail on critical issues)
        npx ts-node scripts/security_scan.ts scan \
          $(cat contract_files.txt) \
          --severity-threshold 7 \
          --format json \
          --output security_report.json \
          --ci
          
    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: contracts/security_report.json
        retention-days: 30
        
    - name: Generate security summary
      run: |
        cd contracts
        if [ -f security_report.json ]; then
          echo "## 🔍 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Extract key metrics from report
          TOTAL_CONTRACTS=$(jq '.contracts | length' security_report.json || echo "0")
          TOTAL_VULNS=$(jq '.summary.totalVulnerabilities' security_report.json || echo "0")
          CRITICAL_VULNS=$(jq '.summary.criticalIssues' security_report.json || echo "0")
          AVG_SECURITY_SCORE=$(jq '.summary.averageSecurityScore' security_report.json || echo "0")
          
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Contracts Scanned | $TOTAL_CONTRACTS |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Vulnerabilities | $TOTAL_VULNS |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical Issues | $CRITICAL_VULNS |" >> $GITHUB_STEP_SUMMARY
          echo "| Average Security Score | $AVG_SECURITY_SCORE/100 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$CRITICAL_VULNS" -gt 0 ]; then
            echo "🚨 **CRITICAL VULNERABILITIES DETECTED**" >> $GITHUB_STEP_SUMMARY
            echo "Immediate attention required. See detailed report for remediation steps." >> $GITHUB_STEP_SUMMARY
          elif [ "$TOTAL_VULNS" -gt 0 ]; then
            echo "⚠️ **VULNERABILITIES DETECTED**" >> $GITHUB_STEP_SUMMARY
            echo "Review and address the identified issues." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **SECURITY SCAN PASSED**" >> $GITHUB_STEP_SUMMARY
            echo "No critical security issues detected." >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "## 🔍 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "❌ Security scan failed to generate report" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Check for critical vulnerabilities
      run: |
        cd contracts
        if [ -f security_report.json ]; then
          CRITICAL_VULNS=$(jq '.summary.criticalIssues' security_report.json || echo "0")
          if [ "$CRITICAL_VULNS" -gt 0 ]; then
            echo "🚨 Critical vulnerabilities detected! Failing CI/CD pipeline."
            echo "Critical issues found: $CRITICAL_VULNS"
            exit 1
          else
            echo "✅ No critical vulnerabilities detected. CI/CD pipeline passes."
          fi
        else
          echo "❌ Security report not found. Failing CI/CD pipeline."
          exit 1
        fi

  backend-security-tests:
    name: Backend Security Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
        
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
        
    - name: Run security tests
      run: |
        cd backend
        npm run test:security
        
    - name: Run dependency security audit
      run: |
        cd backend
        npm audit --audit-level moderate

  frontend-security-tests:
    name: Frontend Security Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Run security tests
      run: |
        cd frontend
        npm run test:security
        
    - name: Run dependency security audit
      run: |
        cd frontend
        npm audit --audit-level moderate

  integration-security-tests:
    name: Integration Security Tests
    runs-on: ubuntu-latest
    needs: [security-scan, backend-security-tests, frontend-security-tests]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup test environment
      run: |
        # Start test services (mock blockchain, backend, etc.)
        docker-compose -f docker-compose.test.yml up -d
        
    - name: Wait for services
      run: |
        sleep 30
        
    - name: Run integration security tests
      run: |
        cd contracts
        cargo test security_test -- --nocapture
        
    - name: Run end-to-end security tests
      run: |
        cd frontend
        npm run test:e2e:security
        
    - name: Cleanup test environment
      if: always()
      run: |
        docker-compose -f docker-compose.test.yml down -v

  security-report-generation:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: always()
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download security artifacts
      uses: actions/download-artifact@v4
      with:
        name: security-report
        path: contracts/
        
    - name: Generate comprehensive security report
      run: |
        cd contracts
        if [ -f security_report.json ]; then
          # Generate HTML report
          npx ts-node scripts/security_scan.ts scan \
            $(find src -name "*.rs" -type f) \
            --format html \
            --output comprehensive_security_report.html \
            --severity-threshold 0
            
          # Generate CSV report
          npx ts-node scripts/security_scan.ts scan \
            $(find src -name "*.rs" -type f) \
            --format csv \
            --output security_summary.csv \
            --severity-threshold 0
        fi
        
    - name: Upload comprehensive reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: comprehensive-security-reports
        path: |
          contracts/comprehensive_security_report.html
          contracts/security_summary.csv
        retention-days: 90

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [security-scan, backend-security-tests, frontend-security-tests, integration-security-tests]
    if: always()
    
    steps:
    - name: Evaluate security status
      run: |
        echo "## 🚪 Security Gate Evaluation" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Check if all jobs passed
        SECURITY_SCAN_STATUS="${{ needs.security-scan.result }}"
        BACKEND_STATUS="${{ needs.backend-security-tests.result }}"
        FRONTEND_STATUS="${{ needs.frontend-security-tests.result }}"
        INTEGRATION_STATUS="${{ needs.integration-security-tests.result }}"
        
        echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Contract Security Scan | $SECURITY_SCAN_STATUS |" >> $GITHUB_STEP_SUMMARY
        echo "| Backend Security Tests | $BACKEND_STATUS |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend Security Tests | $FRONTEND_STATUS |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Security Tests | $INTEGRATION_STATUS |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Determine overall status
        if [[ "$SECURITY_SCAN_STATUS" == "success" && "$BACKEND_STATUS" == "success" && "$FRONTEND_STATUS" == "success" && "$INTEGRATION_STATUS" == "success" ]]; then
          echo "✅ **SECURITY GATE PASSED**" >> $GITHUB_STEP_SUMMARY
          echo "All security checks passed successfully." >> $GITHUB_STEP_SUMMARY
          echo "SECURITY_GATE_RESULT=PASSED" >> $GITHUB_ENV
        else
          echo "❌ **SECURITY GATE FAILED**" >> $GITHUB_STEP_SUMMARY
          echo "One or more security checks failed. Review the detailed results above." >> $GITHUB_STEP_SUMMARY
          echo "SECURITY_GATE_RESULT=FAILED" >> $GITHUB_ENV
        fi
        
    - name: Set deployment status
      run: |
        if [[ "$SECURITY_GATE_RESULT" == "PASSED" ]]; then
          echo "🚀 Deployment approved - Security gate passed"
        else
          echo "🛑 Deployment blocked - Security gate failed"
          exit 1
        fi

  notify-security-team:
    name: Notify Security Team
    runs-on: ubuntu-latest
    needs: [security-gate]
    if: always() && (needs.security-gate.result == 'failure' || github.event_name == 'pull_request')
    
    steps:
    - name: Create security alert
      uses: actions/github-script@v7
      with:
        script: |
          const securityGateResult = '${{ needs.security-gate.result }}';
          const isPullRequest = '${{ github.event_name }}' === 'pull_request';
          
          if (securityGateResult === 'failure' || isPullRequest) {
            const title = securityGateResult === 'failure' 
              ? '🚨 Security Gate Failed - Deployment Blocked'
              : '🔍 Security Scan Results Available';
            
            const body = securityGateResult === 'failure'
              ? `The security gate has failed for commit ${{ github.sha }}. Deployment has been blocked until security issues are resolved.\n\n**Action Required:**\n- Review the security scan results\n- Fix critical vulnerabilities\n- Re-run the security tests\n\nSee the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
              : `Security scan results are available for pull request #${{ github.event.number }}.\n\nPlease review the security findings before merging.\n\nSee the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;
            
            if (isPullRequest) {
              // Create comment on pull request
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            } else {
              // Create issue for security team
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'urgent']
              });
            }
          }
